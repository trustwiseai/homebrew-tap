name: Update Cask and Test

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and sha256 from release
        id: info
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Download the tarball and compute sha256
          gh release download "v${VERSION}" --pattern "*.tar.gz" --dir /tmp/release
          SHA=$(shasum -a 256 /tmp/release/*.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "SHA256: $SHA"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update cask formula
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          SHA="${{ steps.info.outputs.sha256 }}"

          # Get current version from cask file
          OLD_VERSION=$(grep '  version "' Casks/trustwise-cli.rb | sed 's/.*version "\(.*\)"/\1/')
          OLD_SHA=$(grep '    sha256 "' Casks/trustwise-cli.rb | sed 's/.*sha256 "\(.*\)"/\1/')

          # Replace version and sha256 in-place
          sed -i '' "s|version \"${OLD_VERSION}\"|version \"${VERSION}\"|g" Casks/trustwise-cli.rb
          sed -i '' "s|sha256 \"${OLD_SHA}\"|sha256 \"${SHA}\"|g" Casks/trustwise-cli.rb
          sed -i '' "s|/v${OLD_VERSION}/|/v${VERSION}/|g" Casks/trustwise-cli.rb

          echo "Updated cask:"
          cat Casks/trustwise-cli.rb

      - name: Test brew install
        run: |
          brew cleanup -s 2>/dev/null || true
          brew untap trustwiseai/tap 2>/dev/null || true
          brew tap trustwiseai/tap "$(pwd)"
          brew install --cask trustwise-cli --force
          trustwise --version
          echo "Homebrew install test passed"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/trustwise-cli.rb
          git diff --cached --quiet || git commit -m "Update trustwise-cli to v${{ steps.info.outputs.version }}"
          git push
