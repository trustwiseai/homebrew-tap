name: Update Cask

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version and sha256 from release
        id: info
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          gh release download "v${VERSION}" --pattern "*.tar.gz" --dir /tmp/release
          SHA=$(shasum -a 256 /tmp/release/*.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "SHA256: $SHA"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update cask formula
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          SHA="${{ steps.info.outputs.sha256 }}"

          OLD_VERSION=$(grep '  version "' Casks/trustwise-cli.rb | sed 's/.*version "\(.*\)"/\1/')
          OLD_SHA=$(grep '    sha256 "' Casks/trustwise-cli.rb | sed 's/.*sha256 "\(.*\)"/\1/')

          sed -i "s|version \"${OLD_VERSION}\"|version \"${VERSION}\"|g" Casks/trustwise-cli.rb
          sed -i "s|sha256 \"${OLD_SHA}\"|sha256 \"${SHA}\"|g" Casks/trustwise-cli.rb
          sed -i "s|/v${OLD_VERSION}/|/v${VERSION}/|g" Casks/trustwise-cli.rb

          echo "Updated cask:"
          cat Casks/trustwise-cli.rb

      - name: Create PR
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          BRANCH="update-cask-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Casks/trustwise-cli.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update trustwise-cli to v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Update trustwise-cli to v${VERSION}" \
            --body "Automated update from CLI release v${VERSION}

          SHA256: ${{ steps.info.outputs.sha256 }}"
        env:
          GH_TOKEN: ${{ github.token }}
